<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#2563eb"><meta name="mobile-web-app-capable" content="yes"><title>AidePlanning</title><link rel="manifest" href="manifest.json"><link rel="icon" href="icon.svg"><link rel="stylesheet" href="style.css"></head><body>
<header><div><small>AIDE À DOMICILE</small><h1>AidePlanning</h1></div><button id="today">Aujourd’hui</button></header>
<main>
<section id="planning" class="page active">
<div class="card month"><button id="prev">‹</button><div><h2 id="month"></h2><p id="monthTotal"></p></div><button id="next">›</button></div>
<div class="card"><div class="week"><b>Lun</b><b>Mar</b><b>Mer</b><b>Jeu</b><b>Ven</b><b>Sam</b><b>Dim</b></div><div id="calendar" class="calendar"></div></div>
<div class="card"><div class="title"><div><small>JOURNÉE</small><h2 id="dayTitle"></h2></div><strong id="dayTotal">0h00</strong></div><div id="visits"></div><button id="addVisit" class="primary">+ Ajouter une intervention</button><button id="duplicate">Dupliquer cette journée</button></div>
</section>
<section id="people" class="page"><div class="title"><div><small>RÉPERTOIRE</small><h2>Bénéficiaires</h2></div><button id="addPerson" class="primary compact">+ Ajouter</button></div><div class="card"><input id="search" placeholder="Rechercher une personne"></div><div id="peopleList"></div></section>
<section id="stats" class="page"><div class="title"><div><small>SYNTHÈSE</small><h2 id="statsTitle"></h2></div></div><div class="stats"><article><span>Heures</span><strong id="sHours"></strong></article><article><span>Visites</span><strong id="sVisits"></strong></article><article><span>Personnes</span><strong id="sPeople"></strong></article><article><span>Jours</span><strong id="sDays"></strong></article></div><div class="card"><h3>Temps par bénéficiaire</h3><div id="personStats"></div></div><div class="card"><h3>Sauvegarde</h3><p>Les données restent sur ce téléphone.</p><button id="csv" class="primary">Exporter le mois en CSV</button><button id="backup">Créer une sauvegarde complète</button><label class="file">Restaurer une sauvegarde<input id="restore" type="file" accept=".json"></label></div></section>
</main>
<nav><button data-page="planning" class="active">📅<span>Planning</span></button><button data-page="people">👥<span>Personnes</span></button><button data-page="stats">📊<span>Résumé</span></button></nav>
<dialog id="visitDlg"><form id="visitForm"><div class="title"><h2 id="visitDlgTitle">Intervention</h2><button type="button" class="close">×</button></div><input id="visitId" type="hidden"><label>Bénéficiaire<select id="visitPerson" required></select></label><div class="two"><label>Entrée<input id="start" type="time" required></label><label>Sortie<input id="end" type="time" required></label></div><label>Note<textarea id="visitNote" rows="3"></textarea></label><div class="two"><button type="button" id="deleteVisit" class="danger">Supprimer</button><button class="primary">Enregistrer</button></div></form></dialog>
<dialog id="personDlg"><form id="personForm"><div class="title"><h2 id="personDlgTitle">Bénéficiaire</h2><button type="button" class="close">×</button></div><input id="personId" type="hidden"><label>Nom<input id="personName" required placeholder="Mme Dupont"></label><label>Adresse<input id="address"></label><label>Téléphone<input id="phone" type="tel"></label><label>Informations utiles<textarea id="notes" rows="3"></textarea></label><div class="two"><button type="button" id="deletePerson" class="danger">Supprimer</button><button class="primary">Enregistrer</button></div></form></dialog>
<div id="toast"></div><script src="app.js"></script></body></html>
